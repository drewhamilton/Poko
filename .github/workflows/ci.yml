name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: |
            24
            25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build
        run: ./gradlew build publishToMavenLocal --stacktrace
        env:
          ORG_GRADLE_PROJECT_personalGpgKey: ${{ secrets.ORG_GRADLE_PROJECT_personalGpgKey }}
          ORG_GRADLE_PROJECT_personalGpgPassword: ${{ secrets.ORG_GRADLE_PROJECT_personalGpgPassword }}

      - name: Upload MavenLocal directory
        uses: actions/upload-artifact@v7
        with:
          name: MavenLocal
          path: ~/.m2/repository/dev/drewhamilton/poko/
          if-no-files-found: error

  test-with-jdk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        poko_tests_jvm_toolchain_version: [ 8, 11, 17, 21 ]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Install JDK ${{ matrix.poko_tests_jvm_toolchain_version }}
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: |
            ${{ matrix.poko_tests_jvm_toolchain_version }}
            25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Test
        run: >-
          ./gradlew :poko-tests:jvmTest --stacktrace
          -Dorg.gradle.project.pokoTests.jvmToolchainVersion=${{ matrix.poko_tests_jvm_toolchain_version }}

  build-sample:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        # Note: periodically update dev versions with latest from
        # https://packages.jetbrains.team/maven/p/kt/bootstrap/org/jetbrains/kotlin/kotlin-gradle-plugin/.
        # Keep past dev versions too; try to target active versions of IntelliJ based on tags in
        # https://github.com/JetBrains/kotlin. Can also use
        # https://github.com/ZacSweers/metro/blob/main/docs/compatibility.md as a reference.
        poko_sample_kotlin_version: [ 2.4.0-dev-2124, ~, 2.4.20-dev-4664 ]
    env:
      poko_sample_kotlin_version: ${{ matrix.poko_sample_kotlin_version }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          # Minimum supported Java version for Gradle:
          java-version: 17
      - name: Download MavenLocal
        uses: actions/download-artifact@v8
        with:
          name: MavenLocal
          path: ~/.m2/repository/dev/drewhamilton/poko/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Upgrade yarn lock
        if: ${{ matrix.poko_sample_kotlin_version != null && !startsWith(matrix.poko_sample_kotlin_version, '2.4.0-dev') }}
        run: cd sample && ./gradlew kotlinUpgradeYarnLock

      - name: Build sample
        run: cd sample && ./gradlew build --stacktrace

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.configureondemand=true
    -Dkotlin.incremental=false
    -Dorg.gradle.jvmargs="-Xmx3g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:MaxMetaspaceSize=512m"
